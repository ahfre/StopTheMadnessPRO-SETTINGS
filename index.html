<style>
/* ── Reset ── */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#111113;
  color:#e5e5e7;
  min-height:100vh;
  padding:0;
}

/* ── Top bar (title + page tabs) ── */
#top-bar{
  background:#1c1c1e;
  padding:12px 16px 10px;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid #2a2a2c;
}
#top-bar h1{
  text-align:center;
  font-size:18px;
  color:#fff;
  margin-bottom:10px;
}
#tab-row{
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
  justify-content:center;
}
.tab-wrap{display:flex;align-items:center;gap:2px}
.tab-move{
  background:none;border:none;color:#555;
  font-size:12px;cursor:pointer;padding:2px 5px;
  border-radius:5px;line-height:1;transition:color .15s,background .15s;
}
.tab-move:not(:disabled):hover{color:#e5e5e7;background:#3a3a3c}
.tab-move:disabled{opacity:0;pointer-events:none}
.page-tab{
  border:none;padding:6px 13px;border-radius:7px;
  font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;
  background:#2c2c2e;color:#8e8e93;
}
.page-tab:hover{background:#3a3a3c;color:#e5e5e7}
.page-tab.on{background:#0a84ff;color:#fff}
#new-page-btn{
  background:#3a3a3c;color:#e5e5e7;border:none;
  padding:6px 12px;border-radius:7px;font-size:13px;cursor:pointer;
}
#new-page-btn:hover{background:#48484a}

/* ── Pages container ── */
#pages-wrap{
  padding:14px 14px 30px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* ── Single page block ── */
.page-block{
  background:#1e1e21;
  border:1px solid #2e2e32;
  border-radius:13px;
  padding:12px 12px 14px;
}
.page-block-header{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
}
.page-block-title{
  font-size:13px;font-weight:700;
  color:#8e8e93;text-transform:uppercase;
  letter-spacing:.6px;flex:1;
}
.add-col-btn{
  background:#3a3a3c;color:#e5e5e7;border:none;
  padding:5px 13px;border-radius:7px;font-size:12px;cursor:pointer;
}
.add-col-btn:hover{background:#48484a}

/* ── Columns scroll area ── */
.cols-scroll{
  display:flex;
  gap:0;
  overflow-x:auto;
  align-items:flex-start;
  padding-bottom:4px;
}
.col-gap{width:12px;flex-shrink:0}

/* ── Column outer ── */
.col-outer{display:flex;flex-direction:column;flex-shrink:0}
.col-ctrl{
  display:flex;justify-content:center;gap:4px;
  margin-bottom:4px;
}
.col-ctrl button{
  background:#2a2a2d;color:#aaa;border:none;
  padding:3px 10px;border-radius:6px;font-size:11px;
  cursor:pointer;transition:all .15s;
}
.col-ctrl button:not(:disabled):hover{background:#3a3a3c;color:#e5e5e7}
.col-ctrl button:disabled{color:#404044;cursor:default}
.exp-btn{background:#2a2a2d!important;color:#555!important}
.exp-btn.lit{background:#0a4a88!important;color:#60b4ff!important}
.exp-btn.lit:hover{background:#0a5599!important;color:#fff!important}

/* ── Column card ── */
.column{
  background:#252528;border-radius:10px;
  padding:12px 12px 14px;
  width:390px;min-width:390px;
  position:relative;
  transition:width .2s;
}
.column.wide{width:820px}

/* ── Domain input ── */
.dom-input{
  width:100%;padding:7px 10px;border-radius:7px;
  border:1px solid #3a3a3c;background:#1a1a1c;
  color:#fff;font-size:14px;text-align:center;font-weight:600;
  outline:none;margin-bottom:8px;
}
.dom-input::placeholder{color:#555;font-weight:400}

/* ── Delete ── */
.del-col{
  background:none;border:none;color:#ff453a;
  font-size:16px;cursor:pointer;
  position:absolute;top:9px;right:9px;
  padding:2px 6px;border-radius:5px;
}
.del-col:hover{background:rgba(255,69,58,.15)}

/* ── Section / labels ── */
.sec-title{
  font-size:11.5px;font-weight:700;color:#8e8e93;
  text-transform:uppercase;letter-spacing:.5px;
  margin:12px 0 5px;padding-top:7px;
  border-top:1px solid #333336;
}
.sec-title:first-of-type{border-top:none;margin-top:2px}
.sec-note{font-size:11px;color:#555;margin:-2px 0 4px;font-style:italic}
.sub-lbl{font-size:12px;color:#999;margin:6px 0 3px;font-weight:600}
.info-row{font-size:11px;color:#555;margin:2px 0}

/* ── Setting rows ── */
.s-row{
  display:flex;align-items:center;padding:3px 0;
  font-size:13px;gap:7px;min-width:0;
}
.s-row.ind{padding-left:20px}
.lbl{flex:1;cursor:default;line-height:1.3;min-width:0}

/* ── Checkbox ── */
.cb-w{width:19px;height:19px;flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.cb-b{width:16px;height:16px;border:2px solid #555;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0}
.cb-b.on{background:#0a84ff;border-color:#0a84ff}
.cb-b.on::after{content:'✓';color:#fff;font-size:11px;font-weight:700;line-height:1}

/* ── Radio ── */
.rd-w{width:19px;height:19px;flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.rd-c{width:16px;height:16px;border:2px solid #555;border-radius:50%;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.rd-c.on{background:#0a84ff;border-color:#0a84ff}
.rd-c.on::after{content:'';width:6px;height:6px;background:#fff;border-radius:50%}

/* ── Form controls ── */
.s-sel{background:#1a1a1c;color:#e5e5e7;border:1px solid #3a3a3c;
  border-radius:5px;padding:3px 6px;font-size:12px;flex-shrink:0;outline:none}
.s-num{background:#1a1a1c;color:#e5e5e7;border:1px solid #3a3a3c;
  border-radius:5px;padding:3px 5px;font-size:12px;width:56px;
  flex-shrink:0;text-align:center;outline:none}
.s-txt{background:#1a1a1c;color:#e5e5e7;border:1px solid #3a3a3c;
  border-radius:5px;padding:3px 6px;font-size:12px;width:74px;
  flex-shrink:0;outline:none}
.s-2ch{background:#1a1a1c;color:#e5e5e7;border:1px solid #3a3a3c;
  border-radius:5px;padding:3px 4px;font-size:12px;width:32px;
  flex-shrink:0;text-align:center;outline:none}

/* ── Plain textarea ── */
.plain-ta{
  width:100%;min-height:36px;padding:7px;
  font-family:-apple-system,sans-serif;font-size:12px;
  color:#e5e5e7;background:#1a1a1c;
  border:1px solid #3a3a3c;border-radius:6px;
  resize:none;outline:none;
  overflow-x:auto;overflow-y:hidden;
  white-space:pre;line-height:1.5;
  margin:3px 0 5px;
}

/* ── Action button ── */
.act-btn{
  display:inline-block;background:#2c5aa0;color:#fff;
  border:none;padding:4px 10px;border-radius:6px;
  font-size:11px;cursor:pointer;margin:3px 3px 3px 0;
}
.act-btn:hover{background:#3a6fc0}

/* ── CodeMirror overrides ── */
.cm-wrap{
  margin:3px 0 8px;
  border:1px solid #3a3a3c;
  border-radius:7px;
  overflow:hidden;
}
.cm-wrap .CodeMirror{
  height:auto;
  min-height:60px;
  font-family:"SF Mono",Menlo,Consolas,monospace;
  font-size:12px;
  line-height:1.6;
  background:#141416;
  color:#e5e5e7;
  border-radius:7px;
}
.cm-wrap .CodeMirror-scroll{
  overflow-x:auto!important;
  overflow-y:hidden!important;
  min-height:60px;
}
.cm-wrap .CodeMirror-hscrollbar{
  /* always show hscrollbar when content overflows */
  display:block;
}
.cm-wrap .CodeMirror-lines{padding:9px 0}
.cm-wrap .CodeMirror pre.CodeMirror-line{padding:0 10px}
.cm-wrap .CodeMirror-gutters{
  background:#1a1a1c;
  border-right:1px solid #2e2e32;
}
.cm-wrap .CodeMirror-linenumber{color:#484850;padding:0 6px}
.cm-wrap .CodeMirror-cursor{border-left:2px solid #e5e5e7}
/* matching brackets */
.cm-wrap .CodeMirror-matchingbracket{
  color:#fff!important;
  background:#0a84ff!important;
  border-radius:2px;
}
.cm-wrap .CodeMirror-nonmatchingbracket{
  color:#fff!important;
  background:#ff453a!important;
  border-radius:2px;

/* scrollbar styling */
.cm-wrap .CodeMirror-hscrollbar::-webkit-scrollbar{height:5px}
.cm-wrap .CodeMirror-hscrollbar::-webkit-scrollbar-track{background:#1a1a1c}
.cm-wrap .CodeMirror-hscrollbar::-webkit-scrollbar-thumb{background:#3a3a3c;border-radius:3px}
.cols-scroll::-webkit-scrollbar{height:5px}
.cols-scroll::-webkit-scrollbar-track{background:#1a1a1c;border-radius:3px}
.cols-scroll::-webkit-scrollbar-thumb{background:#3a3a3c;border-radius:3px}
</style>

/* ══════════════════════════════════════════════
   STATE HELPERS
══════════════════════════════════════════════ */
function freshCol(key){
  var def = (TPL[key]||{def:[]}).def;
  var v = {};
  def.forEach(function(s){
    if(!s.id) return;
    if(s.t==='cb') v[s.id]=false;
    if(s.t==='cb_sel'){ v[s.id]=false; v[s.id+'_s']=s.opts[0]; }
    if(s.t==='cb_num'){ v[s.id]=false; v[s.id+'_n']=''; }
    if(s.t==='radio') v[s.id]=false;
    if(s.t==='sel_only') v[s.id]=s.opts[0];
    if(s.t==='sel_2char'){ v[s.id]=s.opts[0]; v[s.id+'_l']=''; }
    if(s.t==='num_only'||s.t==='txt_input'||s.t==='plain_ta'||s.t==='code') v[s.id]='';
  });
  return { domain:'', key:key, vals:v, wide:false };
}

function freshState(){
  return {
    order:   ['stm','vimkey','vimlike','ublock','nextdns'],
    visible: { stm:true, vimkey:false, vimlike:false, ublock:false, nextdns:false },
    pages: {
      stm:     { cols:[ freshCol('stm'), freshCol('stm'), freshCol('stm') ] },
      vimkey:  { cols:[] },
      vimlike: { cols:[] },
      ublock:  { cols:[] },
      nextdns: { cols:[] },
    }
  };
}

function loadState(){
  try{
    var d = JSON.parse(localStorage.getItem(SK));
    if(!d) return freshState();
    if(!d.order)   d.order   = ['stm','vimkey','vimlike','ublock','nextdns'];
    if(!d.visible) d.visible = { stm:true,vimkey:false,vimlike:false,ublock:false,nextdns:false };
    if(!d.pages)   d.pages   = freshState().pages;
    return d;
  } catch(e){ return freshState(); }
}

function persist(){ localStorage.setItem(SK, JSON.stringify(G)); }

var G = loadState();

function destroyAllCM(){
  cmInstances.forEach(function(cm){ try{ cm.toTextArea(); }catch(e){} });
  cmInstances = [];
}

/* ══════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════ */
function render(){
  destroyAllCM();
  renderTabRow();
  renderPages();
}

/* ── Tab row ── */
function renderTabRow(){
  var row = document.getElementById('tab-row');
  var addBtn = document.getElementById('new-page-btn');
  row.innerHTML = '';

  G.order.forEach(function(key, i){
    var tmpl = TPL[key];
    if(!tmpl) return;
    var wrap = document.createElement('div');
    wrap.className = 'tab-wrap';

    var lBtn = document.createElement('button');
    lBtn.className='tab-move'; lBtn.textContent='←';
    lBtn.disabled = (i===0);
    lBtn.addEventListener('click', function(e){
      e.stopPropagation();
      if(i>0){
        var t=G.order[i]; G.order[i]=G.order[i-1]; G.order[i-1]=t;
        persist(); render();
      }
    });

    var tab = document.createElement('button');
    tab.className = 'page-tab' + (G.visible[key]?' on':'');
    tab.textContent = tmpl.name;
    tab.addEventListener('click', function(){
      G.visible[key] = !G.visible[key];
      persist(); render();
    });

    var rBtn = document.createElement('button');
    rBtn.className='tab-move'; rBtn.textContent='→';
    rBtn.disabled = (i===G.order.length-1);
    rBtn.addEventListener('click', function(e){
      e.stopPropagation();
      if(i<G.order.length-1){
        var t=G.order[i]; G.order[i]=G.order[i+1]; G.order[i+1]=t;
        persist(); render();
      }
    });

    wrap.appendChild(lBtn); wrap.appendChild(tab); wrap.appendChild(rBtn);
    row.appendChild(wrap);
  });

  row.appendChild(addBtn);
}

/* ── Pages ── */
function renderPages(){
  var wrap = document.getElementById('pages-wrap');
  wrap.innerHTML = '';

  G.order.forEach(function(key){
    if(!G.visible[key]) return;
    var tmpl = TPL[key];
    if(!tmpl) return;

    var block = document.createElement('div');
    block.className = 'page-block';

    // Header
    var hdr = document.createElement('div');
    hdr.className = 'page-block-header';
    var title = document.createElement('div');
    title.className = 'page-block-title';
    title.textContent = tmpl.name;
    hdr.appendChild(title);

    if(tmpl.def.length > 0){
      var addBtn = document.createElement('button');
      addBtn.className = 'add-col-btn';
      addBtn.textContent = '＋ Legg til kolonne';
      addBtn.addEventListener('click', function(){
        if(!G.pages[key]) G.pages[key]={cols:[]};
        G.pages[key].cols.push(freshCol(key));
        persist(); render();
        // scroll to right
        setTimeout(function(){
          var sc = block.querySelector('.cols-scroll');
          if(sc) sc.scrollLeft = sc.scrollWidth;
        }, 80);
      });
      hdr.appendChild(addBtn);
    }
    block.appendChild(hdr);

    // Columns scroll
    var scroll = document.createElement('div');
    scroll.className = 'cols-scroll';
    var pg = G.pages[key] || {cols:[]};

    if(tmpl.def.length === 0){
      var emp = document.createElement('div');
      emp.style.cssText='color:#555;font-size:13px;padding:8px 4px;';
      emp.textContent='(Tom side)';
      scroll.appendChild(emp);
    } else {
      pg.cols.forEach(function(col, ci){
        if(ci>0){ var g=document.createElement('div'); g.className='col-gap'; scroll.appendChild(g); }
        scroll.appendChild(buildColOuter(key, ci, col, pg));
      });
    }

    block.appendChild(scroll);
    wrap.appendChild(block);
  });
}

/* ── Column outer ── */
function buildColOuter(key, ci, col, pg){
  var outer = document.createElement('div');
  outer.className = 'col-outer';

  var ctrl = document.createElement('div');
  ctrl.className = 'col-ctrl';

  var lB = mkCtrlBtn('←');
  lB.disabled = (ci===0);
  lB.addEventListener('click', function(){
    if(ci>0){ var t=pg.cols[ci]; pg.cols[ci]=pg.cols[ci-1]; pg.cols[ci-1]=t; persist(); render(); }
  });

  var expB = document.createElement('button');
  expB.className = 'exp-btn';
  expB.textContent = col.wide ? '⟨⟩ Kollaps' : '⟨⟩ Ekspander';
  expB.title = 'Ekspander/kollaps bredde';

  var rB = mkCtrlBtn('→');
  rB.disabled = (ci===pg.cols.length-1);
  rB.addEventListener('click', function(){
    if(ci<pg.cols.length-1){ var t=pg.cols[ci]; pg.cols[ci]=pg.cols[ci+1]; pg.cols[ci+1]=t; persist(); render(); }
  });

  ctrl.appendChild(lB); ctrl.appendChild(expB); ctrl.appendChild(rB);
  outer.appendChild(ctrl);

  var colEl = buildColumn(key, ci, col, pg, expB);
  outer.appendChild(colEl);

  // Set expand button state after column is built (CM editors present)
  setTimeout(function(){ refreshExpBtn(expB, col, colEl); }, 120);

  return outer;
}

function mkCtrlBtn(txt){
  var b = document.createElement('button');
  b.textContent = txt;
  return b;
}

function refreshExpBtn(btn, col, colEl){
  var needs = colNeedsWidth(colEl);
  if(col.wide){
    btn.classList.add('lit');
    btn.disabled = false;
    btn.textContent = '⟨⟩ Kollaps';
  } else if(needs){
    btn.classList.add('lit');
    btn.disabled = false;
    btn.textContent = '⟨⟩ Ekspander';
  } else {
    btn.classList.remove('lit');
    btn.disabled = false; // always allow toggle
    btn.textContent = '⟨⟩ Ekspander';
  }
  btn.onclick = function(){
    col.wide = !col.wide;
    persist(); render();
  };
}

function colNeedsWidth(colEl){
  // Check if any CM editor or textarea has horizontal overflow
  var cms = colEl.querySelectorAll('.CodeMirror');
  for(var i=0; i<cms.length; i++){
    var sc = cms[i].querySelector('.CodeMirror-sizer');
    if(sc && sc.offsetWidth > 350) return true;
  }
  var tas = colEl.querySelectorAll('.plain-ta');
  for(var i=0; i<tas.length; i++){
    if(tas[i].scrollWidth > tas[i].clientWidth+10) return true;
  }
  return false;
}

/* ── Column ── */
function buildColumn(key, ci, col, pg, expB){
  var def = (TPL[key]||{def:[]}).def;
  var div = document.createElement('div');
  div.className = 'column' + (col.wide?' wide':'');

  // Delete button
  var del = document.createElement('button');
  del.className='del-col'; del.textContent='✕';
  del.addEventListener('click', function(){
    if(confirm('Slett kolonnen?')){ pg.cols.splice(ci,1); persist(); render(); }
  });
  div.appendChild(del);

  // Domain
  var dom = document.createElement('input');
  dom.className='dom-input'; dom.placeholder='Domene (f.eks. example.com)';
  dom.value = col.domain||'';
  dom.addEventListener('input', function(){ col.domain=dom.value; persist(); });
  div.appendChild(dom);

  function onContentChange(){
    setTimeout(function(){ refreshExpBtn(expB, col, div); }, 60);
  }

  def.forEach(function(s){
    var el = null;
    switch(s.t){
      case 'section':  el=mkSec(s);  break;
      case 'note':     el=mkNote(s); break;
      case 'sublabel': el=mkSub(s);  break;
      case 'info':     el=mkInfo(s); break;
      case 'act_btn':  el=mkActBtn(s); break;
      case 'cb':       el=mkCB(col,s,onContentChange);      break;
      case 'cb_sel':   el=mkCBSel(col,s,onContentChange);   break;
      case 'cb_num':   el=mkCBNum(col,s,onContentChange);   break;
      case 'radio':    el=mkRadio(col,s,def);                break;
      case 'sel_only': el=mkSelOnly(col,s);                  break;
      case 'sel_2char':el=mkSel2Char(col,s);                 break;
      case 'num_only': el=mkNumOnly(col,s);                  break;
      case 'txt_input':el=mkTxtInput(col,s);                 break;
      case 'plain_ta': el=mkPlainTA(col,s,onContentChange);  break;
      case 'code':     el=mkCode(col,s,onContentChange);     break;
    }
    if(el) div.appendChild(el);
  });

  return div;
}

/* ── Section builders ── */
function mkSec(s){  var d=document.createElement('div'); d.className='sec-title';  d.textContent=s.label; return d; }
function mkNote(s){ var d=document.createElement('div'); d.className='sec-note';   d.textContent=s.label; return d; }
function mkSub(s){  var d=document.createElement('div'); d.className='sub-lbl';    d.textContent=s.label; return d; }
function mkInfo(s){ var d=document.createElement('div'); d.className='info-row';   d.textContent=s.label; return d; }
function mkActBtn(s){ var b=document.createElement('button'); b.className='act-btn'; b.textContent=s.label; return b; }

function mkCB(col,s,cb){
  var row=r(s); var w=cbWrap(); var box=cbBox(col.vals[s.id]);
  w.appendChild(box);
  var lbl=mkLbl(s.label);
  function tog(){ col.vals[s.id]=!col.vals[s.id]; box.classList.toggle('on',col.vals[s.id]); persist(); if(cb)cb(); }
  w.addEventListener('click',tog); lbl.addEventListener('click',tog);
  row.appendChild(w); row.appendChild(lbl); return row;
}
function mkCBSel(col,s,cb){
  var row=r(s); var w=cbWrap(); var box=cbBox(col.vals[s.id]);
  w.appendChild(box);
  var lbl=mkLbl(s.label);
  function tog(){ col.vals[s.id]=!col.vals[s.id]; box.classList.toggle('on',col.vals[s.id]); persist(); if(cb)cb(); }
  w.addEventListener('click',tog); lbl.addEventListener('click',tog);
  var sel=mkSel(s.opts, col.vals[s.id+'_s']);
  sel.addEventListener('change',function(){ col.vals[s.id+'_s']=sel.value; persist(); });
  row.appendChild(w); row.appendChild(lbl); row.appendChild(sel); return row;
}
function mkCBNum(col,s,cb){
  var row=r(s); var w=cbWrap(); var box=cbBox(col.vals[s.id]);
  w.appendChild(box);
  var lbl=mkLbl(s.label);
  function tog(){ col.vals[s.id]=!col.vals[s.id]; box.classList.toggle('on',col.vals[s.id]); persist(); if(cb)cb(); }
  w.addEventListener('click',tog); lbl.addEventListener('click',tog);
  var num=document.createElement('input'); num.className='s-num'; num.type='text';
  num.value=col.vals[s.id+'_n']||'';
  num.addEventListener('input',function(){ col.vals[s.id+'_n']=num.value; persist(); });
  row.appendChild(w); row.appendChild(lbl); row.appendChild(num); return row;
}
function mkRadio(col,s,def){
  var row=r(s); var w=document.createElement('div'); w.className='rd-w';
  var c=document.createElement('div'); c.className='rd-c'+(col.vals[s.id]?' on':'');
  w.appendChild(c);
  var lbl=mkLbl(s.label);
  function click(){
    def.forEach(function(x){ if(x.t==='radio'&&x.group===s.group) col.vals[x.id]=false; });
    col.vals[s.id]=true; persist(); render();
  }
  w.addEventListener('click',click); lbl.addEventListener('click',click);
  row.appendChild(w); row.appendChild(lbl); return row;
}
function mkSelOnly(col,s){
  var row=r(s); var lbl=mkLbl(s.label);
  var sel=mkSel(s.opts,col.vals[s.id]);
  sel.addEventListener('change',function(){ col.vals[s.id]=sel.value; persist(); });
  row.appendChild(lbl); row.appendChild(sel); return row;
}
function mkSel2Char(col,s){
  var row=r(s); var lbl=mkLbl(s.label);
  var sel=mkSel(s.opts,col.vals[s.id]);
  sel.addEventListener('change',function(){ col.vals[s.id]=sel.value; persist(); });
  var ci=document.createElement('input'); ci.className='s-2ch'; ci.maxLength=2; ci.placeholder='nb';
  ci.value=col.vals[s.id+'_l']||'';
  ci.addEventListener('input',function(){ col.vals[s.id+'_l']=ci.value; persist(); });
  row.appendChild(lbl); row.appendChild(sel); row.appendChild(ci); return row;
}
function mkNumOnly(col,s){
  var row=r(s); var lbl=mkLbl(s.label);
  var inp=document.createElement('input'); inp.className='s-num'; inp.type='text';
  inp.value=col.vals[s.id]||'';
  inp.addEventListener('input',function(){ col.vals[s.id]=inp.value; persist(); });
  row.appendChild(lbl); row.appendChild(inp); return row;
}
function mkTxtInput(col,s){
  var row=r(s); var lbl=mkLbl(s.label);
  var inp=document.createElement('input'); inp.className='s-txt'; inp.type='text';
  inp.value=col.vals[s.id]||'';
  inp.addEventListener('input',function(){ col.vals[s.id]=inp.value; persist(); });
  row.appendChild(lbl); row.appendChild(inp); return row;
}
function mkPlainTA(col,s,cb){
  var ta=document.createElement('textarea'); ta.className='plain-ta';
  ta.value=col.vals[s.id]||'';
  function resize(){ ta.style.height='1px'; ta.style.height=Math.max(36,ta.scrollHeight)+'px'; }
  ta.addEventListener('input',function(){ col.vals[s.id]=ta.value; persist(); resize(); if(cb)cb(); });
  setTimeout(resize,0);
  return ta;
}

/* ── CodeMirror editor ── */
function mkCode(col,s,cb){
  var wrap = document.createElement('div');
  wrap.className = 'cm-wrap';

  var ta = document.createElement('textarea');
  ta.value = col.vals[s.id]||'';
  wrap.appendChild(ta);

  // Defer so the element is in DOM before CM initialises
  setTimeout(function(){
    var cm = CodeMirror.fromTextArea(ta, {
      mode:           s.lang||'javascript',
      theme:          'material-darker',
      lineNumbers:    true,
      matchBrackets:  true,
      autoCloseBrackets: true,
      indentUnit:     2,
      tabSize:        2,
      indentWithTabs: false,
      lineWrapping:   false,   // horizontal scroll instead of wrap
      viewportMargin: Infinity,
      extraKeys: {
        Tab: function(cm){
          if(cm.somethingSelected()){ cm.indentSelection('add'); }
          else { cm.replaceSelection('  ','end'); }
        }
      }
    });

    cmInstances.push(cm);

    cm.on('change', function(){
      col.vals[s.id] = cm.getValue();
      persist();
      if(cb) cb();
    });

    // Refresh after layout
    setTimeout(function(){ cm.refresh(); if(cb)cb(); }, 60);
  }, 0);

  return wrap;
}

/* ── Tiny helpers ── */
function r(s){
  var d=document.createElement('div');
  d.className='s-row'+(s.indent?' ind':'');
  return d;
}
function cbWrap(){
  var d=document.createElement('div'); d.className='cb-w'; return d;
}
function cbBox(checked){
  var d=document.createElement('div');
  d.className='cb-b'+(checked?' on':'');
  return d;
}
function mkLbl(txt){
  var s=document.createElement('span'); s.className='lbl'; s.textContent=txt; return s;
}
function mkSel(opts,val){
  var sel=document.createElement('select'); sel.className='s-sel';
  opts.forEach(function(o){
    var op=document.createElement('option'); op.value=o; op.textContent=o; sel.appendChild(op);
  });
  sel.value=val||opts[0];
  return sel;
}

/* ══════════════════════════════════════════════
   NEW PAGE
══════════════════════════════════════════════ */
document.getElementById('new-page-btn').addEventListener('click', function(){
  var name = prompt('Navn på ny side:');
  if(!name||!name.trim()) return;
  var key = 'c_'+Date.now();
  TPL[key] = { name:name.trim(), def:[] };
  G.order.push(key);
  G.visible[key] = true;
  G.pages[key] = { cols:[] };
  persist();
  render();
});

/* ══════════════════════════════════════════════
   GO
══════════════════════════════════════════════ */
render();
</script>
